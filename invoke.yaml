# invoke.yaml — project configuration

# Code folders
code_dir: analysis
notebooks_dir: notebooks

# Data folders
source_data_dir: source_data
output_data_dir: output_data

# ── Data input configuration ──────────────────────────────────────────────────
# Point these to your actual data files. Edit paths as needed.

phenotype_file: source_data/phenotype.tsv

# EEG: set eeg_input_type to "tsv" (flat feature table) or "mne" (MNE output folder)
eeg_input_type: tsv
eeg_tsv: source_data/eeg_features.tsv
eeg_mne_dir: source_data/mne_output

# fMRI: set fmri_input_type to "tsv" (flat connectivity table) or "halfpipe" (Halfpipe output)
fmri_input_type: tsv
fmri_tsv: source_data/fmri_features.tsv
fmri_halfpipe_dir: source_data/halfpipe_output
# Halfpipe denoising strategy = value of the feature- BIDS tag (e.g. Baseline, 36P, aCompCor)
fmri_halfpipe_strategy: Baseline

# ── Prediction configuration ──────────────────────────────────────────────────
# Column from phenotype_file to predict (e.g. "diagnosis", "age", "anxiety_score")
target_column: diagnosis

# Model: logistic | ridge | elasticnet | svm | random_forest
model_type: ridge

# Cross-validation folds (outer = evaluation, inner = hyperparameter tuning)
cv_outer_folds: 5
cv_inner_folds: 5

# PCA: keep enough components to explain this fraction of variance (per modality)
pca_variance: 0.95

# Number of permutations for the null distribution (p-value vs chance)
n_permutations: 500
