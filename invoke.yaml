# invoke.yaml — project configuration

# Code folders
code_dir: analysis
notebooks_dir: notebooks

# Data folders
source_data_dir: source_data
output_data_dir: output_data

# ── Data input paths ──────────────────────────────────────────────────────────
# Point each path to a file (.tsv) or a directory (MNE-BIDS / Halfpipe).
# Format is detected automatically from the path itself:
#   file  → flat TSV (any filename)
#   dir   → MNE-BIDS (EEG) or Halfpipe derivatives (fMRI)

phenotype_file: source_data/phenotype.tsv
eeg_path: source_data/eeg_features.tsv
fmri_path: source_data/fmri_features.tsv

# BIDS task label for MNE-BIDS .fif files (only used when eeg_path is a directory)
eeg_mne_task: rest

# Halfpipe denoising strategy tag (only used when fmri_path is a directory)
# Value of the feature- BIDS tag, e.g. Baseline, 36P, aCompCor
fmri_halfpipe_strategy: Baseline

# ── Prediction configuration ──────────────────────────────────────────────────
# Column from phenotype_file to predict (e.g. "diagnosis", "age", "anxiety_score")
target_column: diagnosis

# Model: logistic | ridge | elasticnet | svm | random_forest
model_type: ridge

# Cross-validation folds (outer = evaluation, inner = hyperparameter tuning)
cv_outer_folds: 5
cv_inner_folds: 5

# PCA: keep enough components to explain this fraction of variance (per modality)
pca_variance: 0.95

# Number of permutations for the null distribution (p-value vs chance)
n_permutations: 100
